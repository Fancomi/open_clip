# =============================================================
# Dataset A: signal in top PCs — RISK TEST baseline
# =============================================================
name: a_baseline
seed: 42
device: cpu
dataset: a
dataset_kwargs:
  n: 6000
  dim: 64
  n_classes: 4
  signal_dims: 4
  signal_scale: 5.0
  noise_scale: 0.5
batch_size: 256
epochs: 80
lr: 1.0e-3
weight_decay: 1.0e-4
model:
  arch: mlp2
  dropout: 0.0
  pca_insert_after: ["input"]
pca_drop:
  enabled: false
