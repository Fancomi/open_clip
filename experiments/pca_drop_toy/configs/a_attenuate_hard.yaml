# =============================================================
# Dataset A HARD: tighter SNR + linear classifier + input PCA
# Purpose: confirm attenuate_topk HURTS when signal = top PCs
# =============================================================
name: a_attenuate_hard
seed: 42
device: cpu
dataset: a
dataset_kwargs:
  n: 6000
  dim: 64
  n_classes: 4
  signal_dims: 4
  signal_scale: 1.5    # was 5.0 -- tighter SNR
  noise_scale: 1.0     # was 0.5 -- more noise
batch_size: 256
epochs: 80
lr: 1.0e-3
weight_decay: 1.0e-4
model:
  arch: linear          # linear: cannot reroute signal
  dropout: 0.0
  pca_insert_after: ["input"]
pca_drop:
  enabled: true
  backend: momentum
  mode: attenuate_topk
  top_k: 4
  alpha: 0.9
  momentum: 0.99
  warmup_steps: 50
  update_every: 1
  train_only: true
  eps: 1.0e-5
