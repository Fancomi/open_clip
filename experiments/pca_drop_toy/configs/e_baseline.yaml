# =============================================================
# Dataset E: multi-class spurious (harder) — BASELINE
# =============================================================
name: e_baseline
seed: 42
device: cpu
dataset: e
dataset_kwargs:
  n_train: 5000
  n_test: 1000
  dim: 64
  n_classes: 4
  signal_dims: 8
  spurious_dims: 8
  signal_scale: 2.0
  spurious_scale_train: 10.0
  spurious_scale_test: 0.1
  noise_scale: 0.5
  spurious_corr: 0.85
batch_size: 256
epochs: 80
lr: 1.0e-3
weight_decay: 1.0e-4
model:
  arch: mlp2
  dropout: 0.0
  pca_insert_after: [0]
pca_drop:
  enabled: false
