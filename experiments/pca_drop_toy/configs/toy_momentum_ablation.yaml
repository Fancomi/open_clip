# ============================================================
# toy_momentum_ablation.yaml
# Dataset B, mode: attenuate_topk
# Sweep momentum values to compare stability
# (Run via scripts/run_experiments.sh --sweep momentum)
# ============================================================

name: toy_momentum_ablation_b
seed: 42
device: "cpu"

dataset: b
dataset_kwargs:
  n: 6000
  dim: 64
  n_classes: 4
  signal_dims_start: 16
  nuisance_scale: 8.0
  signal_scale: 1.5
  noise_scale: 0.3

batch_size: 256
epochs: 80
lr: 1.0e-3
weight_decay: 1.0e-4

model:
  arch: mlp2
  dropout: 0.0
  pca_insert_after: [0]

pca_drop:
  enabled: true
  backend: momentum
  mode: attenuate_topk
  top_k: 8
  alpha: 0.5
  momentum: 0.9            # override per-run via CLI: --pca_momentum 0.9 / 0.99 / 0.995
  warmup_steps: 20
  update_every: 1
  train_only: true
  eps: 1.0e-5
