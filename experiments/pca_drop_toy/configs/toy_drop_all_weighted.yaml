# ============================================================
# toy_drop_all_weighted.yaml
# Dataset B: nuisance in top PCs
# Mode: drop_all_pc_weighted  (eigenvalue-proportional drop)
# ============================================================

name: toy_drop_all_weighted_dataset_b
seed: 42
device: "cpu"

dataset: b
dataset_kwargs:
  n: 6000
  dim: 64
  n_classes: 4
  signal_dims_start: 16
  nuisance_scale: 8.0
  signal_scale: 1.5
  noise_scale: 0.3

batch_size: 256
epochs: 80
lr: 1.0e-3
weight_decay: 1.0e-4

model:
  arch: mlp2
  dropout: 0.0
  pca_insert_after: [0]

pca_drop:
  enabled: true
  backend: momentum
  mode: drop_all_pc_weighted
  max_drop_prob: 0.7     # top PCs get up to 70% drop
  min_drop_prob: 0.01    # low-var PCs always barely touched
  inverted_scale: true
  momentum: 0.99
  warmup_steps: 20
  update_every: 1
  train_only: true
  eps: 1.0e-5
