# ============================================================
# toy_drop_topk.yaml
# Dataset B: nuisance in top PCs
# Mode: drop_topk  (random PC dropout)
# Comparison: vs attenuate_topk and baseline
# ============================================================

name: toy_drop_topk_dataset_b
seed: 42
device: "cpu"

dataset: b
dataset_kwargs:
  n: 6000
  dim: 64
  n_classes: 4
  signal_dims_start: 16
  nuisance_scale: 8.0
  signal_scale: 1.5
  noise_scale: 0.3

batch_size: 256
epochs: 80
lr: 1.0e-3
weight_decay: 1.0e-4

model:
  arch: mlp2
  dropout: 0.0
  pca_insert_after: [0]

pca_drop:
  enabled: true
  backend: momentum
  mode: drop_topk
  top_k: 8
  drop_prob: 0.3
  per_sample_mask: false
  inverted_scale: true
  momentum: 0.99
  warmup_steps: 20
  update_every: 1
  train_only: true
  eps: 1.0e-5
